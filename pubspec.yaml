name: artitecture_design
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase packages
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.4

  # Working packages
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  share_plus: ^7.2.1
  permission_handler: ^11.0.1
  http: ^1.1.0
  http_parser: ^4.0.2
  gallery_saver_plus: ^3.2.9
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/logos.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logos.png"
  min_sdk_android: 21
  remove_alpha_ios: true